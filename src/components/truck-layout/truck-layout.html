<div class="p-4">

  <!-- Column headers -->
  <div class="grid grid-cols-13 gap-2 mb-2">
    <div></div> <!-- empty corner -->

    @for (col of columns; track col) {
      <div class="text-center text-sm font-semibold text-gray-600">
        {{ col }}
      </div>
    }
  </div>

  <!-- Rows -->
  @for (row of rows; track row) {

    <div class="grid grid-cols-13 gap-2 mb-2 items-center"
      (click)="selectTruck()"
    >

      <!-- Row label -->
      <div class="font-semibold text-gray-700">
        {{ row }}
      </div>

      <!-- Squares -->
      @for (col of columns; track col) {
        <div class="w-12 h-12 bg-blue-100 rounded-md flex items-center justify-center text-sm font-medium text-blue-700">
          {{ row }}{{ col }}
        </div>
      }

    </div>

  }

</div>
